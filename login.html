<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - DIUXA Tech Hub</title>
</head>
<body>
    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DIUXA Tech Hub</title>

    <link rel="stylesheet" href="login.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="style.css">
</head>

<body>

    <div class="login-container">

        <!-- Left Side -->
        <div class="login-left">

            <img src="diuxalogo.png" alt="DIUXA Logo" class="logo">

            <h1>Welcome Back</h1>

            <p>
                Login to access your courses, learning materials,
                assignments and student dashboard.
            </p>

            <img src="images/login-image.png"
                 alt="Students Learning"
                 class="login-image">

        </div>


        <!-- Right Side -->
        <div class="login-right">

            <div class="login-card">

                <h2>Student Login</h2>

                <form action="#">

                    <div class="input-group">
                        <i class="fa-solid fa-envelope"></i>

                        <input
                            type="email"
                            placeholder="Email Address"
                            required
                        >
                    </div>

                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>

                        <input
                            type="password"
                            placeholder="Password"
                            required
                        >
                    </div>

                    <div class="login-options">

                        <label>
                            <input type="checkbox">
                            Remember Me
                        </label>

                        <a href="forgot-password.html">
                            Forgot Password?
                        </a>

                    </div>

                    <button class="login-btn">
                        Login
                    </button>

                </form>

                <div class="divider">
                    OR
                </div>

                <div class="social-login">

                    <button class="google-btn">
                        <i class="fa-brands fa-google"></i>
                        Continue with Google
                    </button>

                </div>

                <p class="register-text">
                    Don't have an account?

                    <a href="register.html">
                        Register Here
                    </a>
                </p>

            </div>

        </div>

    </div>

</body>
</html>
</body>
</html>
